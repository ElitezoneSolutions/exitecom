<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background gradient: deep navy to blue -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>

    <!-- Accent glow for the mark -->
    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1a56db"/>
    </linearGradient>

    <!-- Soft inner glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle drop shadow for the mark container -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#1a56db" flood-opacity="0.35"/>
    </filter>

    <!-- Clip to rounded square icon shape -->
    <clipPath id="iconClip">
      <rect width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <!-- Rounded icon background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- Subtle radial highlight top-left -->
  <radialGradient id="highlight" cx="30%" cy="25%" r="55%">
    <stop offset="0%" stop-color="#1e47c5" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#0d1f3c" stop-opacity="0"/>
  </radialGradient>
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#highlight)"/>

  <!-- ── Logo mark — centered, scaled to ~460px unit space ── -->
  <!-- Outer border rectangle: maps the 32×32 SVG viewBox to ~460×460 at center -->
  <!-- Scale factor: 460/28 ≈ 16.43, offset so (2,2)→(282,282) i.e. origin at 512-230=282 -->
  <g transform="translate(512,512)" filter="url(#shadow)">

    <!-- Outer frame -->
    <rect
      x="-230" y="-230"
      width="460" height="460"
      rx="18" ry="18"
      fill="none"
      stroke="url(#markGrad)"
      stroke-width="22"
    />

    <!-- Top accent bar — full width -->
    <rect x="-156" y="-96" width="312" height="22" rx="6" fill="url(#markGrad)" filter="url(#glow)"/>

    <!-- Middle bar — 62% width (shorter, like the logo's middle line) -->
    <rect x="-156" y="-11" width="194" height="22" rx="6" fill="#60a5fa" opacity="0.9"/>

    <!-- Bottom bar — full width -->
    <rect x="-156" y="74" width="312" height="22" rx="6" fill="url(#markGrad)" filter="url(#glow)"/>

    <!-- Small decorative dot/accent bottom-right inside frame -->
    <circle cx="130" cy="130" r="18" fill="#1a56db" opacity="0.55"/>
  </g>
</svg>
